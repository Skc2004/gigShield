services:
  - type: web
    name: gigshield-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python seed.py"
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/backend/data/gigshield_production.db
    disk:
      name: gigshield-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
